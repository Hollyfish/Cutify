openapi: 3.0.3
info:
  title: Cutify API
  description: |
    Cutify berber randevu uygulaması için RESTful API.

    ## Özellikler
    - Kullanıcı kayıt ve giriş sistemi
    - Berber listeleme
    - Berber hizmetlerini görüntüleme
    - Randevu oluşturma ve yönetme
    - Admin berber yönetimi
  version: 1.0.0
  contact:
    name: API Support
    email: support@cutify.com

servers:
  - url: https://api.cutify.com/v1
    description: Production server
  - url: http://localhost:3000/v1
    description: Development server

tags:
  - name: auth
    description: Kullanıcı kimlik doğrulama işlemleri
  - name: users
    description: Kullanıcı profil işlemleri
  - name: barbers
    description: Berber işlemleri
  - name: services
    description: Berber hizmetleri
  - name: appointments
    description: Randevu işlemleri

paths:

  /auth/register:
    post:
      tags:
        - auth
      summary: Üye Olma
      description: Yeni kullanıcı kaydı oluşturur
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Kullanıcı oluşturuldu
        '400':
          description: Geçersiz veri

  /auth/login:
    post:
      tags:
        - auth
      summary: Giriş Yapma
      description: Email ve şifre ile giriş yapılır
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Giriş başarılı
        '401':
          description: Email veya şifre hatalı

  /barbers:
    get:
      tags:
        - barbers
      summary: Berberleri Listeleme
      description: Sistemde kayıtlı tüm berberleri listeler
      operationId: listBarbers
      responses:
        '200':
          description: Berberler başarıyla listelendi

    post:
      tags:
        - barbers
      summary: Berber Ekleme
      description: Sisteme yeni berber ekler
      operationId: createBarber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarberCreate'
      responses:
        '201':
          description: Berber oluşturuldu

  /barbers/{barberId}:
    get:
      tags:
        - barbers
      summary: Berber Detay Görüntüleme
      operationId: getBarber
      parameters:
        - name: barberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Berber detay bilgileri
        '404':
          description: Berber bulunamadı

    put:
      tags:
        - barbers
      summary: Berber Güncelleme
      operationId: updateBarber
      parameters:
        - name: barberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarberCreate'
      responses:
        '200':
          description: Berber güncellendi

    delete:
      tags:
        - barbers
      summary: Berber Silme
      operationId: deleteBarber
      parameters:
        - name: barberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Berber silindi

  /barbers/{barberId}/services:
    get:
      tags:
        - services
      summary: Berber Hizmetlerini Listeleme
      operationId: listBarberServices
      parameters:
        - name: barberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hizmetler listelendi

  /appointments:
    post:
      tags:
        - appointments
      summary: Randevu Oluşturma
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
      responses:
        '201':
          description: Randevu oluşturuldu

  /appointments/{appointmentId}:
    put:
      tags:
        - appointments
      summary: Randevu Güncelleme
      operationId: updateAppointment
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
      responses:
        '200':
          description: Randevu güncellendi

    delete:
      tags:
        - appointments
      summary: Randevu Silme
      operationId: deleteAppointment
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Randevu silindi

  /appointments/{appointmentId}/status:
    put:
      tags:
        - appointments
      summary: Randevu Durumunu Güncelleme
      description: Admin randevu durumunu değiştirir
      operationId: updateAppointmentStatus
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Randevu durumu güncellendi

  /users/{userId}:
    get:
      tags:
        - users
      summary: Profil Görüntüleme
      operationId: getUserProfile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Kullanıcı bilgileri

    put:
      tags:
        - users
      summary: Profil Güncelleme
      operationId: updateUserProfile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Profil güncellendi

components:

  schemas:

    UserRegister:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string

    BarberCreate:
      type: object
      required:
        - name
        - location
      properties:
        name:
          type: string
        location:
          type: string
        phone:
          type: string

    AppointmentCreate:
      type: object
      required:
        - barberId
        - serviceId
        - date
        - time
      properties:
        barberId:
          type: string
        serviceId:
          type: string
        date:
          type: string
        time:
          type: string